services:
  bot:
    build: .
    container_name: brain-rot-bot
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python personal_greeter.py' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    env_file:
      - .env
    environment:
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
      - BACKUP_SOURCE_DIR=/backup-source/Discord-Brain-Rot
      - HONKER_ENABLED=true
      - HONKER_REQUIRED=true
    volumes:
      - /home/gabi/github/Discord-Brain-Rot/bot:/app/bot
      - /home/gabi/github/Discord-Brain-Rot/personal_greeter.py:/app/personal_greeter.py
      - /home/gabi/github/Discord-Brain-Rot/config.py:/app/config.py
      - /home/gabi/github/Discord-Brain-Rot/sounds:/app/sounds
      - /home/gabi/github/Discord-Brain-Rot/data:/app/data
      - /home/gabi/github/Discord-Brain-Rot/downloads:/app/downloads
      - /home/gabi/github/Discord-Brain-Rot/logs:/app/logs
      - /home/gabi/github/Discord-Brain-Rot/debug:/app/debug
      - /home/gabi/github/Discord-Brain-Rot/templates:/app/templates
      - /home/gabi/github/backups/discord-brainrot:/backups/discord-brainrot
      - /home/gabi/github/Discord-Brain-Rot:/backup-source/Discord-Brain-Rot:ro
    command: python personal_greeter.py
    privileged: true
    pid: host

  web:
    build: .
    container_name: brain-rot-web
    restart: always
    profiles: ["web"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=2)\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HONKER_ENABLED=true
      - HONKER_REQUIRED=true
    volumes:
      - /home/gabi/github/Discord-Brain-Rot/bot:/app/bot
      - /home/gabi/github/Discord-Brain-Rot/web_page.py:/app/web_page.py
      - /home/gabi/github/Discord-Brain-Rot/config.py:/app/config.py
      - /home/gabi/github/Discord-Brain-Rot/sounds:/app/sounds
      - /home/gabi/github/Discord-Brain-Rot/data:/app/data
      - /home/gabi/github/Discord-Brain-Rot/templates:/app/templates
    command: python web_page.py
