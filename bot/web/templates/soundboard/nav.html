    <nav class="nav">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="nav-brand-mark" aria-hidden="true">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' x='50%25' text-anchor='middle' font-size='48'%3E%F0%9F%A7%A0%3C/text%3E%3C/svg%3E"
                        alt="">
                </span>
                <span class="nav-brand-copy">
                    <span class="nav-brand-label">Discord Brain Rot</span>
                    <span class="nav-brand-subtitle">Web Sound Desk</span>
                </span>
            </a>
            <div class="nav-links">
                {% if guild_options %}
                <label class="guild-selector-shell" for="guildSelector">
                    <select id="guildSelector" class="guild-selector" aria-label="Select guild">
                        {% for guild in guild_options %}
                        <option value="{{ guild.get('guild_id') }}" {% if guild.get('is_default') %}selected{% endif %}>
                            {{ guild.get('name') }}
                        </option>
                        {% endfor %}
                    </select>
                </label>
                {% endif %}
                <a href="/" class="nav-link active">
                    <span class="nav-icon" aria-hidden="true">🎛️</span>
                    <span class="nav-text">Soundboard</span>
                </a>
                <a href="/analytics" class="nav-link">
                    <span class="nav-icon" aria-hidden="true">📊</span>
                    <span class="nav-text">Analytics</span>
                </a>
            </div>
            <div class="nav-actions">
                {% if discord_user %}
                <div class="auth-user-cluster">
                    <a href="/logout?next=/" class="auth-user-link" title="Logout {{ display_name }}">
                        <img class="auth-avatar" src="{{ avatar_url }}" alt="{{ display_name }}">
                        <span class="auth-user-meta">
                            <span class="auth-user-name">{{ display_name }}</span>
                            <span class="auth-user-logout">Logout</span>
                        </span>
                    </a>
                    {% if web_user_is_admin %}
                    <button type="button" id="webUploadInboxOpenButton" class="auth-inbox-button"
                        aria-label="Open moderation inbox" title="Moderation inbox">&#9993;&#65038;</button>
                    {% endif %}
                </div>
                {% elif discord_oauth_configured %}
                <a href="{{ discord_login_url }}" class="auth-button">
                    <span class="auth-button-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                            <path fill="currentColor"
                                d="M20.317 4.369A19.791 19.791 0 0 0 15.885 3a13.92 13.92 0 0 0-.602 1.245a18.27 18.27 0 0 0-5.566 0A13.92 13.92 0 0 0 9.115 3a19.736 19.736 0 0 0-4.433 1.369C1.88 8.58 1.12 12.686 1.5 16.734A19.92 19.92 0 0 0 6.818 19a14.99 14.99 0 0 0 1.143-1.873a12.93 12.93 0 0 1-1.798-.868c.151-.113.3-.231.441-.353c3.467 1.628 7.235 1.628 10.661 0c.143.122.29.24.441.353c-.576.336-1.178.627-1.798.868A14.7 14.7 0 0 0 17.051 19a19.856 19.856 0 0 0 5.449-2.266c.456-4.694-.778-8.762-2.183-12.365ZM8.261 14.228c-1.037 0-1.887-.949-1.887-2.114c0-1.165.831-2.114 1.887-2.114c1.055 0 1.905.949 1.887 2.114c0 1.165-.832 2.114-1.887 2.114Zm7.478 0c-1.037 0-1.887-.949-1.887-2.114c0-1.165.831-2.114 1.887-2.114s1.905.949 1.887 2.114c0 1.165-.831 2.114-1.887 2.114Z" />
                        </svg>
                    </span>
                    <span class="auth-button-label">Login <span class="auth-button-label-extended">with
                            Discord</span></span>
                </a>
                {% endif %}
                <button type="button" class="theme-toggle" aria-label="Enable dark mode" aria-pressed="false">
                    🌙
                </button>
            </div>
        </div>
    </nav>
