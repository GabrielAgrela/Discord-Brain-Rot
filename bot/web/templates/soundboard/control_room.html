        <section class="control-room" aria-label="Bot control room">
            <div class="control-room-status">
                <div class="control-room-status-main">
                    <span id="controlRoomStateDot" class="control-room-dot idle" aria-hidden="true"></span>
                    <div class="control-room-equalizer" aria-hidden="true">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <div class="control-room-copy">
                        <p class="card-kicker">Control Room</p>
                        <h2 id="controlRoomNowPlaying" class="control-room-title">Bot status loading</h2>
                        <p id="controlRoomRequester" class="control-room-subtitle">Checking voice state</p>
                    </div>
                </div>
            </div>
            <div class="control-room-metrics">
                <div class="control-room-metric control-room-metric--voice" id="controlRoomVoiceMetric">
                    <span class="control-room-metric-label">Voice</span>
                    <button type="button" id="controlRoomVoiceButton" class="control-room-voice-button"
                        aria-haspopup="dialog" aria-label="Show voice channel members" disabled>
                        <strong id="controlRoomVoice">Disconnected</strong>
                    </button>
                    <div id="voiceMembersDropdown" class="voice-members-dropdown" aria-hidden="true">
                        <div class="voice-members-dropdown-header">
                            <p class="card-kicker">Voice Channel</p>
                            <h3 id="voiceMembersDropdownTitle" class="voice-members-dropdown-title">Disconnected</h3>
                        </div>
                        <div id="voiceMembersDropdownList" class="voice-members-dropdown-list"></div>
                    </div>
                </div>
                <div class="control-room-metric control-room-metric--system" id="controlRoomSystemMetric">
                    <span class="control-room-metric-label">Host</span>
                    <button type="button" id="systemMonitorButton" class="control-room-system-button"
                        aria-haspopup="dialog" aria-label="Show system resource usage" aria-expanded="false" aria-controls="systemMonitorDropdown">
                        <strong id="systemMonitorSummary">CPU --</strong>
                    </button>
                    <div id="systemMonitorDropdown" class="system-monitor-dropdown" aria-hidden="true">
                        <div class="system-monitor-dropdown-header">
                            <p class="card-kicker">System Resources</p>
                            <h3 class="system-monitor-dropdown-title">Host CPU, Disk &amp; RAM</h3>
                        </div>
                        <div id="systemMonitorTotals" class="system-monitor-totals">
                            <div class="system-monitor-total-row" data-monitor-graph-target="cpu" tabindex="0">
                                <span class="system-monitor-total-label">CPU</span>
                                <span class="system-monitor-total-value" id="systemMonitorTotalCpu">--</span>
                            </div>
                            <div class="system-monitor-total-row" data-monitor-graph-target="ram" tabindex="0">
                                <span class="system-monitor-total-label">RAM</span>
                                <span class="system-monitor-total-value" id="systemMonitorTotalRam">--</span>
                            </div>
                            <div class="system-monitor-total-row" data-monitor-graph-target="disk" tabindex="0">
                                <span class="system-monitor-total-label">DISK</span>
                                <span class="system-monitor-total-value" id="systemMonitorTotalDisk">--</span>
                            </div>
                            <div class="system-monitor-total-row" data-monitor-graph-target="temp" tabindex="0">
                                <span class="system-monitor-total-label">TEMP</span>
                                <span class="system-monitor-total-value" id="systemMonitorTotalTemp">--</span>
                            </div>
                        </div>
                        <div id="systemMonitorHoverChart" class="system-monitor-hover-chart" aria-hidden="true">
                            <div class="system-monitor-chart-header">
                                <p id="systemMonitorHoverChartTitle" class="card-kicker">Last Minute</p>
                                <div class="system-monitor-range-selector" role="group" aria-label="Time range">
                                    <button type="button" class="system-monitor-range-btn active" data-range="60">1m</button>
                                    <button type="button" class="system-monitor-range-btn" data-range="3600">1h</button>
                                    <button type="button" class="system-monitor-range-btn" data-range="86400">1d</button>
                                </div>
                                <span id="systemMonitorHoverChartValue" class="system-monitor-chart-value">--</span>
                            </div>
                            <div id="systemMonitorHoverChartPlot" class="system-monitor-resource-chart" role="img"
                                aria-label="Selected system resource history, second by second">
                                <div class="system-monitor-chart-grid" aria-hidden="true"></div>
                                <svg id="systemMonitorHoverChartSvg" viewBox="0 0 600 110" preserveAspectRatio="none"
                                    focusable="false" aria-hidden="true">
                                    <path id="systemMonitorHoverChartArea" class="system-monitor-chart-area" d=""></path>
                                    <path id="systemMonitorHoverChartLine" class="system-monitor-chart-line system-monitor-chart-line--cpu" d=""></path>
                                </svg>
                                <div id="systemMonitorHoverChartMarker" class="system-monitor-chart-marker" aria-hidden="true"></div>
                                <div id="systemMonitorHoverChartReadout" class="system-monitor-chart-readout" aria-hidden="true"></div>
                                <div id="systemMonitorHoverChartEmpty" class="system-monitor-chart-empty">Collecting samples</div>
                            </div>
                        </div>
                        <div id="systemMonitorProcesses" class="system-monitor-processes">
                            <p class="card-kicker">Top CPU</p>
                            <div id="systemMonitorProcessList" class="system-monitor-process-list"></div>
                        </div>
                        <div id="systemMonitorHistoricalProcesses" class="system-monitor-processes system-monitor-historical-processes" style="display: none;">
                            <p class="card-kicker" id="systemMonitorHistoricalProcessesTitle">Processes at --</p>
                            <div id="systemMonitorHistoricalProcessList" class="system-monitor-process-list"></div>
                        </div>
                        <p id="systemMonitorFootnote" class="system-monitor-footnote"></p>
                    </div>
                </div>
                <div class="control-room-action-dock" id="controlRoomActionDock">
                    <button type="button" id="controlRoomActionsButton" class="control-room-actions-trigger"
                        aria-haspopup="true" aria-expanded="false" aria-controls="controlRoomActionMenu"
                        title="Bot actions" aria-label="Bot actions">
                        ⚡
                    </button>
                    <div class="control-room-action-menu" id="controlRoomActionMenu" aria-hidden="true" role="menu">
                        <button type="button" id="webUploadOpenButton"
                            class="control-room-metric-button web-upload-control-button{% if not discord_user %} login-required{% endif %}"
                            title="{% if discord_user %}Upload sound{% else %}Login with Discord to upload sounds{% endif %}"
                            aria-label="{% if discord_user %}Upload sound{% else %}Login with Discord to upload sounds{% endif %}"
                            role="menuitem">
                            {% if discord_user %}⬆️{% else %}🔒{% endif %}
                        </button>
                        <button type="button" id="controlRoomTtsButton"
                            class="control-room-metric-button web-control-button{% if not discord_user %} login-required{% endif %}"
                            data-control-action="tts"
                            title="{% if discord_user %}Text to speech{% else %}Login with Discord to use bot controls{% endif %}"
                            aria-label="{% if discord_user %}Text to speech{% else %}Login with Discord to use bot controls{% endif %}"
                            role="menuitem">
                            {% if discord_user %}💬{% else %}🔒{% endif %}
                        </button>
                        <button type="button" id="controlRoomSlapButton"
                            class="control-room-metric-button web-control-button{% if not discord_user %} login-required{% endif %}"
                            data-control-action="slap"
                            title="{% if discord_user %}Slap{% else %}Login with Discord to use bot controls{% endif %}"
                            aria-label="{% if discord_user %}Slap{% else %}Login with Discord to use bot controls{% endif %}"
                            role="menuitem">
                            {% if discord_user %}👋{% else %}🔒{% endif %}
                        </button>
                        <button type="button" id="controlRoomMuteButton"
                            class="control-room-metric-button web-control-button{% if not discord_user %} login-required{% endif %}"
                            data-control-action="toggle_mute"
                            title="{% if discord_user %}Toggle mute{% else %}Login with Discord to use bot controls{% endif %}"
                            aria-label="{% if discord_user %}Toggle mute{% else %}Login with Discord to use bot controls{% endif %}"
                            role="menuitem">
                            {% if discord_user %}🔇{% else %}🔒{% endif %}
                        </button>
                    </div>
                </div>
            </div>
        </section>
