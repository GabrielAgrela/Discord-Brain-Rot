<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Brain Rot</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' x='50%25' text-anchor='middle' font-size='48'%3E%F0%9F%A7%A0%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=DynaPuff:wght@500;700&display=optional"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='web.css') }}">
    <script>
        try {
            if (localStorage.getItem('brainrot-theme') === 'dark') {
                document.documentElement.classList.add('theme-dark');
            }
        } catch (error) {
            document.documentElement.classList.remove('theme-dark');
        }
    </script>
</head>

<body class="page">
    <div class="error-page">
        <h1>{{ error_title or "Error" }}</h1>
        <p>{{ error_message or "Something went wrong." }}</p>
        <a href="/" class="auth-button">Go to Soundboard</a>
    </div>
</body>

</html>
